*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;color:#fff;direction:rtl;background:linear-gradient(135deg,#0a3d62 0%,#006266 45%,#c0392b 100%);background-attachment:fixed}
.app{max-width:950px;margin:0 auto;padding:8px}
.nav{display:flex;gap:5px;flex-wrap:wrap;background:rgba(0,0,0,.4);border-radius:12px;padding:7px;margin-bottom:12px;justify-content:center}
.nav button{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:8px;padding:6px 11px;font-size:12px;cursor:pointer}
.nav button.active{background:rgba(255,255,255,.35);font-weight:700}
.header{text-align:center;margin-bottom:12px;background:rgba(0,0,0,.35);border-radius:12px;padding:14px}
.header h1{font-size:21px;color:#f9ca24}
.card{background:rgba(0,0,0,.38);border-radius:12px;padding:13px;margin-bottom:11px;border:1px solid rgba(255,255,255,.14)}
.card h2{font-size:15px;color:#f9ca24;margin-bottom:10px}
.mc{background:rgba(255,255,255,.09);border-radius:10px;padding:11px;margin-bottom:9px;border:1px solid rgba(255,255,255,.14)}
.mteams{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.tside{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.flag{font-size:24px;cursor:pointer}
.tname{font-size:11px;text-align:center}
.vs{font-size:12px;opacity:.6;padding:0 6px}
.minfo{font-size:10px;opacity:.65;text-align:center;margin-bottom:6px}
.mresult{text-align:center;font-size:17px;font-weight:700;color:#f9ca24}
.mtime{font-size:12px;font-weight:700;padding:2px 8px;border-radius:5px;background:rgba(255,255,255,.1);display:inline-block;margin:2px auto}
.mtime.live{background:rgba(231,76,60,.5)}
.sinput{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:7px}
.sinput input{width:44px;height:36px;text-align:center;font-size:17px;font-weight:700;border-radius:7px;border:1.5px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);color:#fff}
.lb-table{width:100%;border-collapse:collapse;font-size:13px}
.lb-table th{background:rgba(249,202,36,.2);padding:7px;text-align:center}
.lb-table td{padding:7px;text-align:center;border-bottom:1px solid rgba(255,255,255,.09);cursor:pointer}
.lb-table tr:hover td{background:rgba(255,255,255,.06)}
.rbadge{display:inline-block;width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.15);line-height:24px;font-size:11px;font-weight:700}
.r1{background:#f9ca24;color:#000}.r2{background:#c0c0c0;color:#000}.r3{background:#cd7f32;color:#000}
.gg{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:9px}
.gcard{background:rgba(0,0,0,.3);border-radius:10px;padding:11px}
.gcard h3{color:#f9ca24;margin-bottom:7px;font-size:13px}

.gtable td{padding:4px;text-align:center;border-bottom:1px solid rgba(255,255,255,.07)}

.login-screen h2{color:#f9ca24;margin-bottom:18px;font-size:19px}
.login-screen input{width:100%;padding:10px;border-radius:8px;margin-bottom:11px;border:1.5px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-size:14px;direction:rtl}
.login-screen input::placeholder{color:rgba(255,255,255,.5)}
.btn-p{width:100%;padding:11px;border-radius:10px;border:none;background:#f9ca24;color:#000;font-size:15px;font-weight:700;cursor:pointer}

.btn-gold{background:rgba(249,202,36,.3);border-color:#f9ca24}
.btn-d{border-color:#e74c3c;color:#e74c3c}
.notif{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:#2ecc71;color:#fff;padding:11px 22px;border-radius:10px;font-size:13px;font-weight:700;z-index:9999;display:none;max-width:90vw;box-shadow:0 4px 18px rgba(0,0,0,.4)}
.notif.err{background:#e74c3c}.notif.inf{background:#3498db}

.modal h2{color:#f9ca24;margin-bottom:12px;font-size:17px}
.stbl{width:100%;border-collapse:collapse;font-size:12px}
.stbl th{background:rgba(249,202,36,.2);padding:7px}
.stbl td{padding:7px;border-bottom:1px solid rgba(255,255,255,.07)}
.snote{background:rgba(255,255,255,.07);border-radius:8px;padding:9px 13px;font-size:11px;margin-bottom:11px;line-height:1.75;border-right:3px solid #f9ca24}
.fbar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:11px}
.fbtn{padding:4px 11px;border-radius:20px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:#fff;cursor:pointer;font-size:11px}
.fbtn.active{background:#f9ca24;color:#000;border-color:#f9ca24}
.upred{font-size:11px;text-align:center;margin-top:5px;padding:5px;background:rgba(255,255,255,.07);border-radius:6px}
.upts{color:#2ecc71;font-weight:700}

.styled option{background:#0a3d62}
.ilabel{font-size:11px;opacity:.7;margin-bottom:3px;display:block}
.abox{background:rgba(255,255,255,.06);border-radius:10px;padding:14px;margin-bottom:14px}
.abox h3{color:#f9ca24;font-size:13px;margin-bottom:10px}

.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:7px}
.pcard{background:rgba(255,255,255,.08);border-radius:8px;padding:7px;text-align:center;cursor:pointer;border:1.5px solid transparent;font-size:10px}
.pcard.sel{border-color:#f9ca24;background:rgba(249,202,36,.15)}
.pcard img{width:42px;height:42px;border-radius:50%;margin-bottom:3px;object-fit:cover}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:7px}
.ccard{background:rgba(255,255,255,.08);border-radius:8px;padding:7px;text-align:center;cursor:pointer;border:1.5px solid transparent;font-size:10px}

      const found=S.participants.find(p=>p.id===u.id);
      if(found){S.user=found;S.page="predict";}else S.page="login";
    }else S.page="login";
    render();
    setInterval(autoSync,180000);
  }catch(e){console.error(e);S.page="login";render();}
}

async function loadAll(){
  const[p,m,pr,sp,st]=await Promise.all([
    SB.from("participants").select("*").order("points",{ascending:false}),
    SB.from("matches").select("*"),
    SB.from("predictions").select("*"),
    SB.from("special").select("*"),
    SB.from("standings").select("*"),
  ]);
  if(p.data) S.participants=p.data;
  if(m.data) m.data.forEach(r=>{
    const match=S.matches.find(x=>x.id===r.id);
    if(match){
      match.result=r.home_score!==null&&r.away_score!==null?{home:r.home_score,away:r.away_score}:null;
      match.started=r.started||false;match.finished=r.finished||false;match.minute=r.minute||0;
      if(r.home_team&&r.home_team!=="TBD")match.h=r.home_team;
      if(r.away_team&&r.away_team!=="TBD")match.a=r.away_team;
    }
  });
  if(pr.data){S.preds={};pr.data.forEach(r=>{if(!S.preds[r.user_id])S.preds[r.user_id]={};S.preds[r.user_id][r.match_id]={home:r.home_guess,away:r.away_guess};});}
  if(sp.data){S.tsPreds={};S.wnPreds={};sp.data.forEach(r=>{if(r.top_scorer_id)S.tsPreds[r.user_id]=r.top_scorer_id;if(r.winner_country)S.wnPreds[r.user_id]=r.winner_country;});}
  if(st.data){S.standings={};st.data.forEach(r=>{S.standings[r.country]={pts:r.pts,w:r.wins,l:r.losses,d:r.draws};});}
}

async function autoSync(){
  try{
    const res=await fetch(OFB);if(!res.ok)return;
    const data=await res.json();
    let changed=false;const upserts=[];
    (data.matches||[]).forEach(om=>{
      if(!om.score||!om.score.ft)return;
      const hH=EN2HE[om.team1]||om.team1,aH=EN2HE[om.team2]||om.team2;
      const sh=om.score.ft[0],sa=om.score.ft[1];
      const m=S.matches.find(x=>x.stage==="group"&&(x.h===hH||x.h===om.team1)&&(x.a===aH||x.a===om.team2));
      if(m&&(!m.result||m.result.home!==sh||m.result.away!==sa)){
        m.result={home:sh,away:sa};m.finished=true;m.started=true;
        updStd(hH,aH,sh,sa);
        upserts.push({id:m.id,home_score:sh,away_score:sa,started:true,finished:true,minute:90});
        changed=true;
      }
    });
    if(changed){
      await SB.from("matches").upsert(upserts);
      const stdRows=Object.entries(S.standings).map(([c,v])=>({country:c,pts:v.pts,wins:v.w,losses:v.l,draws:v.d}));
      await SB.from("standings").upsert(stdRows);
      await recalcSave();
      S.lastSync=new Date().toLocaleTimeString("he-IL");
      render();notif("✅ תוצאות עודכנו אוטומטית","inf");
    }
  }catch(e){console.warn(e);}
}

function updStd(h,a,gh,ga){
  if(!S.standings[h])S.standings[h]={pts:0,w:0,l:0,d:0};
  if(!S.standings[a])S.standings[a]={pts:0,w:0,l:0,d:0};
  if(gh>ga){S.standings[h].w++;S.standings[h].pts+=3;S.standings[a].l++;}
  else if(gh<ga){S.standings[a].w++;S.standings[a].pts+=3;S.standings[h].l++;}
  else{S.standings[h].d++;S.standings[h].pts++;S.standings[a].d++;S.standings[a].pts++;}
}

async function recalcSave(){
  S.participants.forEach(p=>{
    let pts=0;
    S.matches.forEach(m=>{if(!m.result)return;const pred=(S.preds[p.id]||{})[m.id];pts+=calcPts(pred,m.result);});
    p.points=pts;
  });
  S.participants.sort((a,b)=>b.points-a.points);
  await SB.from("participants").upsert(S.participants.map(p=>({id:p.id,name:p.name,points:p.points})));
}

function calcPts(pred,result){
  if(!pred||!result)return 0;
  const d=(h,a)=>h>a?"1":h<a?"2":"X";
  if(pred.home===result.home&&pred.away===result.away)return 4;
  if(d(pred.home,pred.away)===d(result.home,result.away))return 2;
  return 0;
}
function canPred(m){return new Date()<new Date(`${m.d}T${m.il}:00+03:00`)-60000;}
function firstStarted(){return S.matches.some(m=>m.stage==="group"&&(m.started||m.finished));}
function notif(msg,type="ok",dur=2800){const e=document.getElementById("notif");e.textContent=msg;e.className="notif"+(type==="err"?" err":type==="inf"?" inf":"");e.style.display="block";setTimeout(()=>e.style.display="none",dur);}
function fmtDate(d){try{return new Date(d).toLocaleDateString("he-IL",{weekday:"short",day:"numeric",month:"long"});}catch{return d;}}

async function doLogin(){
  const name=(document.getElementById("lname").value||"").trim();
  if(!name){notif("נא להזין שם","err");return;}
  let u=S.participants.find(p=>p.name===name);

    הניקוד לכולם מחושב אוטומטית. עדכון ידני רק אם האוטומטי מתעכב.<br>
    <button class="btn-sm" style="margin-top:6px" onclick="manualSync()">🔄 סנכרן עכשיו</button>
  </div>
  <div class="abox"><h3>⚡ עדכון ידני</h3>
    <select class="styled" id="aMatch" style="margin-bottom:8px"><option value="">-- בחר משחק --</option>${ms.map(m=>`<option value="${m.id}">${m.finished?"✅":m.started?"🔴":"⏳"} ${m.h} vs ${m.a} | ${m.d} ${m.il}</option>`).join("")}</select>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:8px">
      <div><div class="ilabel">בית</div><input type="number" id="aH" class="ni" placeholder="0" min="0" max="20"/></div>
      <div style="padding-bottom:10px">–</div>
      <div><div class="ilabel">אורח</div><input type="number" id="aA" class="ni" placeholder="0" min="0" max="20"/></div>
      <div><div class="ilabel">דקה</div><input type="number" id="aMin" class="ni" placeholder="90" min="0" max="120"/></div>
      <div><label style="font-size:11px;display:block;margin-bottom:4px"><input type="checkbox" id="aSt"/> 🟢 התחיל</label><label style="font-size:11px"><input type="checkbox" id="aFin"/> 🏁 נגמר</label></div>
    </div>
    <button class="btn-sm btn-gold" onclick="aUpdateMatch()">✅ עדכן + חשב נקודות</button>
  </div>
  <div class="abox"><h3>⚔️ עדכון נבחרות נוקאאוט</h3>
    <select class="styled" id="aKoM" style="margin-bottom:7px"><option value="">-- בחר --</option>${S.matches.filter(m=>m.stage!=="group").map(m=>`<option value="${m.id}">${m.label}: ${m.h} vs ${m.a}</option>`).join("")}</select>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:7px">
      <div><div class="ilabel">בית</div><select class="styled" id="aKoH" style="width:165px"><option value="TBD">TBD</option>${ALL_C.map(c=>`<option value="${c}">${FLAGS[c]||""} ${c}</option>`).join("")}</select></div>
      <div><div class="ilabel">אורח</div><select class="styled" id="aKoA" style="width:165px"><option value="TBD">TBD</option>${ALL_C.map(c=>`<option value="${c}">${FLAGS[c]||""} ${c}</option>`).join("")}</select></div>
    </div>
    <button class="btn-sm btn-gold" onclick="aUpdateKO()">עדכן נבחרות</button>
  </div>
  <div class="abox"><h3>👥 משתתפים (${S.participants.length}/${MAX_P})</h3>
    <table class="lb-table"><thead><tr><th>שם</th><th>נקודות</th><th></th></tr></thead><tbody>
    ${S.participants.map(p=>`<tr><td><input type="text" id="pn${p.id}" value="${p.name}" style="width:130px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:4px;padding:3px 6px;color:#fff"/></td><td>${p.points}</td><td><button class="btn-sm" onclick="aRename(${p.id})">שמור</button> <button class="btn-sm btn-d" onclick="aRemove(${p.id})">הסר</button></td></tr>`).join("")}
    </tbody></table>
  </div></div>`;
}

async function manualSync(){notif("מסנכרן...","inf");await autoSync();}
async function aUpdateMatch(){
  const mid=parseInt(document.getElementById("aMatch").value);
  const h=parseInt(document.getElementById("aH").value),a=parseInt(document.getElementById("aA").value);
  const fin=document.getElementById("aFin").checked,st=document.getElementById("aSt").checked;
  const min=parseInt(document.getElementById("aMin").value)||0;
  if(!mid||isNaN(h)||isNaN(a)){notif("בחר משחק והזן תוצאה","err");return;}
  const m=S.matches.find(x=>x.id===mid);if(!m)return;
  m.result={home:h,away:a};m.started=st||fin;m.finished=fin;m.minute=min;
  if(m.stage==="group"){updStd(m.h,m.a,h,a);const rows=Object.entries(S.standings).map(([c,v])=>({country:c,pts:v.pts,wins:v.w,losses:v.l,draws:v.d}));await SB.from("standings").upsert(rows);}
  await SB.from("matches").upsert({id:mid,home_score:h,away_score:a,started:m.started,finished:fin,minute:min});
  await recalcSave();notif("✅ עודכן! נקודות חושבו לכולם");render();
}
async function aUpdateKO(){
  const mid=parseInt(document.getElementById("aKoM")?.value);
  const nh=document.getElementById("aKoH")?.value,na=document.getElementById("aKoA")?.value;
  if(!mid){notif("בחר משחק","err");return;}
  const m=S.matches.find(x=>x.id===mid);if(!m)return;
  if(nh&&nh!=="TBD")m.h=nh;if(na&&na!=="TBD")m.a=na;
  await SB.from("matches").upsert({id:mid,home_team:m.h,away_team:m.a});
  notif("✅ עודכן");render();
}
async function aRename(pid){
  const nm=(document.getElementById(`pn${pid}`)?.value||"").trim();if(!nm)return;
  const p=S.participants.find(x=>x.id===pid);if(!p)return;
  p.name=nm;await SB.from("participants").update({name:nm}).eq("id",pid);
  if(S.user?.id===pid)S.user.name=nm;notif("✅ שם עודכן");render();
}
async function aRemove(pid){
  if(!confirm("להסיר?"))return;
  await SB.from("participants").delete().eq("id",pid);
  await SB.from("predictions").delete().eq("user_id",pid);
  await SB.from("special").delete().eq("user_id",pid);
  S.participants=S.participants.filter(x=>x.id!==pid);notif("הוסר");render();
}

function rModal(){if(S.modal?.type==="squad")return rSquadModal();if(S.modal?.type==="userPreds")return rUserPredsModal();return"";}
function showSquad(c){S.modal={type:"squad",country:c};render();}
function closeModal(){S.modal=null;render();}
function rSquadModal(){const c=S.modal.country,sq=SQUADS[c];return`<div class="modal-ov" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h2>${FLAGS[c]||"🏳"} ${c} — סגל</h2><button class="btn-sm" onclick="closeModal()">✕</button></div>${sq?`<table class="stbl"><thead><tr><th>שחקן</th><th>עמדה</th></tr></thead><tbody>${sq.map(p=>`<tr><td>${p.n}</td><td>${p.p}</td></tr>`).join("")}</tbody></table>`:`<p style="text-align:center;padding:24px;opacity:.7">הסגל יפורסם בקרוב<br><span style="font-size:32px">${FLAGS[c]||"🏳"}</span></p>`}</div></div>`;}
function rUserPredsModal(){
  const uid=S.modal.uid,p=S.participants.find(x=>x.id===uid);if(!p)return"";
  const up=S.preds[uid]||{};
  const ts=S.tsPreds[uid]?PLAYERS.find(x=>x.id===S.tsPreds[uid])?.n||"—":"—";
  const wn=S.wnPreds[uid]?(FLAGS[S.wnPreds[uid]]||"")+S.wnPreds[uid]:"—";
  const rows=[...S.matches].sort((a,b)=>new Date(a.d)-new Date(b.d)).map(m=>{const pred=up[m.id];if(!pred)return null;const pts=m.result?calcPts(pred,m.result):null;return`<tr><td style="font-size:10px">${FLAGS[m.h]||""} ${m.h} — ${FLAGS[m.a]||""} ${m.a}</td><td style="font-weight:700">${pred.home}–${pred.away}</td><td>${m.result?`<span style="color:#f9ca24">${m.result.home}–${m.result.away}</span>`:"—"}</td><td>${pts!==null?`<span class="upts">+${pts}</span>`:"—"}</td></tr>`;}).filter(Boolean);
  return`<div class="modal-ov" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h2>ניחושי ${p.name} — ${p.points} נק'</h2><button class="btn-sm" onclick="closeModal()">✕</button></div><div style="font-size:12px;margin-bottom:10px;opacity:.85">🥇 ${ts} | 🏆 ${wn}</div>${rows.length===0?`<p style="text-align:center;padding:20px;opacity:.7">אין ניחושים עדיין</p>`:`<table class="stbl"><thead><tr><th>משחק</th><th>ניחוש</th><th>תוצאה</th><th>נק'</th></tr></thead><tbody>${rows.join("")}</tbody></table>`}</div></div>`;
}

function copyLink(){const url=window.location.href;if(navigator.clipboard){navigator.clipboard.writeText(url).then(()=>notif("📤 קישור הועתק!","inf"));}else{const i=document.createElement("input");i.value=url;document.body.appendChild(i);i.select();document.execCommand("copy");document.body.removeChild(i);notif("📤 הועתק!","inf");}}

window.setPage=p=>{S.page=p;render();};
window.setFilter=f=>{S.mFilter=f;render();};
window.doLogin=doLogin;window.doLogout=doLogout;
window.savePred=savePred;window.pickTS=pickTS;window.pickWN=pickWN;
window.aUpdateMatch=aUpdateMatch;window.aUpdateKO=aUpdateKO;
window.aRename=aRename;window.aRemove=aRemove;
window.showSquad=showSquad;window.closeModal=closeModal;
window.showUserPreds=showUserPreds;window.copyLink=copyLink;
window.manualSync=manualSync;

init();
</script>
</body>
</html>
